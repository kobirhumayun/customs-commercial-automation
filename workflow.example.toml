# Ready-to-fill local config template shared across current and future workflows.
# Copy this file outside git-tracked paths or rename it locally before use.
# Do not commit real credentials, real profile secrets, or protected EntryIDs.

state_timezone = "Asia/Dhaka"

# Writable directories required by startup validation.
report_root = "C:/customs-automation/reports"
run_artifact_root = "C:/customs-automation/state/runs"
backup_root = "C:/customs-automation/state/backups"
master_workbook_root = "C:/customs-automation/workbooks"

# Optional workflow-specific storage roots.
# Example for `import_btb_lc`:
import_document_root = "C:/customs-automation/import-documents"
import_amount_currency = "USD"
# Import workflow storage shape:
# <import_document_root>/<BTB LC year>/
# Current Full Path first stores source evidence under the run artifact tree,
# then promotes deterministically validated PDFs into the year folder.
# File Picker Path accepts only PDFs that resolve beneath import_document_root.

# Outlook / ERP / browser settings.
outlook_profile = "outlook"
erp_base_url = "https://erp.example.local"
# For the live Badsha ERP environment, use:
# erp_base_url = "https://btlerp.badshatex.com"
# Keep real credentials outside git, preferably in environment variables:
# CCA_ERP_USERNAME and CCA_ERP_PASSWORD.
# erp_username = "REPLACE_WITH_USERNAME"
# erp_password = "REPLACE_WITH_PASSWORD"
playwright_browser_channel = "msedge"
playwright_headless = true

# Live ERP report settings.
erp_lc_register_relative_url = "/RptCommercialExport/DateWiseLCRegisterForDocuments"
erp_import_pi_register_relative_url = "/RptExportPInLC/PIRegisterCustomsPDL"
# Optional saved import PI register export for import_btb_lc validation.
# The sample production-style report path is:
# import_pi_register_export_path = "D:/customs-automation/rptPIRegisterCustomsPDL.csv"
erp_download_timeout_seconds = 120
erp_report_default_lookback_days = 365
erp_report_default_from_input_selector = ".dx-texteditor-input"
erp_report_default_to_input_selector = ".dx-texteditor-input"
erp_report_default_from_input_index = 2
erp_report_default_to_input_index = 3
erp_report_submit_selector = 'role=button[name="Submit"]'
erp_report_post_submit_wait_selector = ".dx-menu-item-popout"
erp_report_download_menu_selector = ".dx-menu-item-popout"
erp_report_download_format_selector = '.dxrd-preview-export-item-text:text-is("CSV")'
erp_report_table_selector = "table"

# Optional Playwright session/debug settings:
# playwright_storage_state_path = "C:/customs-automation/secrets/erp-storage-state.json"
#
# Optional ERP report selectors for `inspect-erp-download`.
# Fill these from Playwright codegen or manual inspection.
# erp_report_fill_values = ["#fromDate=2026-03-01", "#toDate=2026-03-31"]

# Bangladesh Bank dashboard live settings for `bb_dashboard_verification`.
# The workflow also supports deterministic fixtures through:
#   validate-run bb_dashboard_verification --dashboard-json <manifest.json>
#
bb_dashboard_login_url = "https://exp.bb.org.bd/ords/oims/r/import/75"
# bb_dashboard_username = "REPLACE_WITH_USERNAME"
# bb_dashboard_password = "REPLACE_WITH_PASSWORD"
bb_dashboard_username_selector = "#P101_USERNAME"
bb_dashboard_password_selector = "#P101_PASSWORD"
bb_dashboard_submit_selector = "a.t12Button:text-is('Login')"
bb_dashboard_post_login_wait_selector = "#P75_SEARCH_LC"
bb_dashboard_search_input_selector = "#P75_SEARCH_LC"
bb_dashboard_search_button_selector = "a.t12Button:text-is('Search')"
bb_dashboard_detail_ready_selector = "#P75_BENEFICIARY_NAME"
bb_dashboard_no_result_selector = "text=Error processing computation."
bb_dashboard_beneficiary_selector = "#P75_BENEFICIARY_NAME"
bb_dashboard_irc_selector = "#P75_IMPORTER"
bb_dashboard_erc_selector = "#P75_EXPORTER"
bb_dashboard_lc_date_selector = "[id=\"P75_LC_DATE|input\"]"
bb_dashboard_last_shipment_selector = "[id=\"P75_LAST_SHIP_DATE|input\"]"
bb_dashboard_expiry_date_selector = "[id=\"P75_LC_EXPIRY_DATE|input\"]"
bb_dashboard_lc_value_selector = "#P75_LC_VALUE"
bb_dashboard_foreign_lc_selector = "xpath=//table[@id='report_R483371920050373531']//table[contains(@class,'t12standardalternatingrowcolors')]//tr[td]/td[2]"
bb_dashboard_quantity_selector = "xpath=//table[@id='report_R483369818911373522']//table[contains(@class,'t12standardalternatingrowcolors')]//tr[td]/td[5]"
bb_dashboard_timeout_seconds = 120
bb_dashboard_back_link_text = "Back"
bb_dashboard_search_edit_link_text = "Inland BTB LC/Contract Search/Edit"
bb_dashboard_login_path_fragment = "/ords/oims/r/import/login"
bb_dashboard_reset_intermediate_url_pattern = "**/350?session=*"
bb_dashboard_reset_search_url_pattern = "**/75?clear=75**"
bb_dashboard_snapshot_settle_timeout_ms = 2000
bb_dashboard_snapshot_stability_window_ms = 200
bb_dashboard_snapshot_poll_interval_ms = 100

# Write-capable workflow settings.
# Use the exact real workbook filename here.
# Manual exact-name configuration is the normal production pattern.
# Example:
# master_workbook_path_template = "C:/customs-automation/workbooks/UP Issuing Status for the Period # 01-03-2026 to 28-02-2027.xlsx"
#
# Optional placeholders are supported if you intentionally want a generated pattern:
# - {year}
# - {workflow_id}
# Optional examples:
# master_workbook_path_template = "C:/customs-automation/workbooks/{year}.xlsx"
# master_workbook_path_template = "C:/customs-automation/workbooks/{workflow_id}-{year}.xlsx"
master_workbook_path_template = "C:/customs-automation/workbooks/UP Issuing Status for the Period # 01-03-2026 to 28-02-2027.xlsx"
excel_lock_timeout_seconds = 120
# Workstation-level live-print safety switch.
# Leave this unchanged when switching workflows:
# - print-capable workflows (`export_lc_sc`, `ud_ip_exp`) consult it only for live print execution
# - non-print workflows (`import_btb_lc`, `bb_dashboard_verification`) ignore it
# Set `false` only if this workstation should block all live print execution.
print_enabled = true

# Required Outlook folder EntryIDs only for Outlook-backed launcher paths.
# `import_btb_lc` File Picker Path bypasses Outlook entirely and does not use these values.
# Discover them with:
# uv run python -m project inspect-outlook-folders --outlook-profile "outlook"
#
# Helpful filters:
# uv run python -m project inspect-outlook-folders --outlook-profile "outlook" --contains "working"
# uv run python -m project inspect-outlook-folders --outlook-profile "outlook" --contains "UD and LC"
# uv run python -m project inspect-outlook-folders --outlook-profile "outlook" --contains "Import"
#
# Then copy the matching JSON `entry_id` values into the two fields below:
# - source_working_folder_entry_id: the folder this workflow reads pending mails from
# - destination_success_entry_id: the folder successful mails move to after completion
# Finalized workflows keep their existing configuration requirements.
# The `import_btb_lc` File Picker launcher may omit these values only through
# its workflow-specific launcher/config adapter; generic validation is unchanged.
source_working_folder_entry_id = "REPLACE_WITH_WORKFLOW_WORKING_FOLDER_ENTRY_ID"
destination_success_entry_id = "REPLACE_WITH_WORKFLOW_SUCCESS_FOLDER_ENTRY_ID"

# Import BTB LC Current Full Path moves successful import mails to this dedicated
# Outlook folder. Keep destination_success_entry_id unchanged for finalized workflows.
import_destination_success_entry_id = "REPLACE_WITH_IMPORT_FOLDER_ENTRY_ID"

# Optional live-adapter settings.
# acrobat_executable_path = "C:/Program Files/Adobe/Acrobat DC/Acrobat/Acrobat.exe"
# print_printer_name = "Your Printer Name"
# print_printer_driver = "Microsoft Print To PDF"
# print_printer_port = "PORTPROMPT:"
print_command_timeout_seconds = 120
